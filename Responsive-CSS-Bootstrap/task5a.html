<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 5 A</title>
    <link rel="stylesheet" href="style5a.css">
</head>
<body>
<div class="main-wrapper">
    <div class="card">
      <h1>Sign Up</h1>
        <p class="subtitle">Please fill in this form to create an account!</p>
        <hr>

<form action="" class="for">
  <div class="inp">
    <input type="text" name="firstname" placeholder="First Name">
    <input type="text" name="lastname" placeholder="Last Name">
    </div>
                
  <div class="in">
      <input type="text" placeholder="Email">            
   </div>

   <div class="in">
     <input type="password" placeholder="Password">
    </div>

    <div class="in">
      <input type="password" name="confirm password" placeholder="Confirm Password">
    </div>

    <div class="check">
      <input type="checkbox" name="" id="terms">
         <label for="terms">I accept the <span>Terms of Use</span> & <span>Privacy Policy</span></label>
    </div>

    <button type="submit">Sign Up</button>
</form>
  </div>

<div class="foot">
  <p>Already have an account? <a href="">Login here</a></p>
   </div>
</div>
</body>
</html>
